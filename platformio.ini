[platformio]
default_envs = mofei
extra_configs = platformio.local.ini

[crosspoint]
version = 1.2.0

[base]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
check_tool = cppcheck
check_flags = --enable=all --suppress=missingIncludeSystem --suppress=unusedFunction --suppress=unmatchedSuppression --suppress=*:*/.pio/* --inline-suppr
check_skip_packages = yes

board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216

build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DEINK_DISPLAY_SINGLE_BUFFER_MODE=1
  -DDISABLE_FS_H_WARNING=1
  -DDESTRUCTOR_CLOSES_FILE=1
# https://libexpat.github.io/doc/api/latest/#XML_GE
  -DXML_GE=0
  -DXML_CONTEXT_BYTES=1024
  -std=gnu++2a
# Enable UTF-8 long file names in SdFat
  -DUSE_UTF8_LONG_NAMES=1
# Increase PNG scanline buffer to support up to 2048px wide images
# Default is (320*4+1)*2=2562, we need more for larger images
  -DPNG_MAX_BUFFERED_PIXELS=16416
  -Wno-bidi-chars
  -Wl,--wrap=panic_print_backtrace,--wrap=panic_abort
  -fno-exceptions

build_unflags =
  -std=gnu++11
  -fexceptions

; Board configuration
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.partitions = partitions.csv

extra_scripts =
  pre:scripts/build_html.py
  pre:scripts/gen_i18n.py
  pre:scripts/git_branch.py
  pre:scripts/patch_jpegdec.py

; Libraries
lib_deps =
  BatteryMonitor=symlink://open-x4-sdk/libs/hardware/BatteryMonitor
  InputManager=symlink://open-x4-sdk/libs/hardware/InputManager
  EInkDisplay=symlink://open-x4-sdk/libs/display/EInkDisplay
  SDCardManager=symlink://open-x4-sdk/libs/hardware/SDCardManager
  bblanchon/ArduinoJson @ 7.4.2
  ricmoo/QRCode @ 0.0.1
  bitbank2/PNGdec @ ^1.0.0
  https://github.com/bitbank2/JPEGDEC.git#86282979224c8a32fd51e091ed5a35b0c699a52b
  links2004/WebSockets @ 2.7.3

[env:default]
extends = base
build_flags =
  ${base.build_flags}
  ; CROSSPOINT_VERSION is set by scripts/git_branch.py (includes current branch)
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=2 ; Set log level to debug for development builds

[env:mofei]
extends = base
board = esp32-s3-devkitc1-n16r8
board_build.partitions = partitions_mofei.csv
board_build.flash_mode = qio
board_build.arduino.memory_type = qio_opi
upload_protocol = esptool
build_flags =
  ${base.build_flags}
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DCROSSPOINT_VERSION=\"${crosspoint.version}-mofei\"
  -DMOFEI_APP=1
  -DMOFEI_DEVICE=1
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=2
lib_deps =
  bblanchon/ArduinoJson @ 7.4.2
  ricmoo/QRCode @ 0.0.1
  bitbank2/PNGdec @ ^1.0.0
  https://github.com/bitbank2/JPEGDEC.git#86282979224c8a32fd51e091ed5a35b0c699a52b
  links2004/WebSockets @ 2.7.3

[env:mofei_touch_soft_i2c]
extends = env:mofei
build_flags =
  ${env:mofei.build_flags}
  -DMOFEI_TOUCH_SOFT_I2C=1
  -DMOFEI_TOUCH_DIAGNOSTIC_LOG=1

[env:mofei_touch_soft_i2c_diag]
extends = env:mofei_touch_soft_i2c

[env:mofei_touch_no_power_diag]
extends = env:mofei
build_flags =
  ${env:mofei.build_flags}
  -DMOFEI_TOUCH_PWR=-1
  -DMOFEI_TOUCH_DIAGNOSTIC_LOG=1

[env:mofei_touch_addr38_diag]
extends = env:mofei
build_flags =
  ${env:mofei.build_flags}
  -DMOFEI_TOUCH_ADDR=0x38
  -DMOFEI_TOUCH_DIAGNOSTIC_LOG=1

[env:mofei_touch_soft_i2c_addr38_diag]
extends = env:mofei_touch_soft_i2c
build_flags =
  ${env:mofei_touch_soft_i2c.build_flags}
  -DMOFEI_TOUCH_ADDR=0x38

[env:mofei_touch_soft_i2c_power_low_diag]
extends = env:mofei_touch_soft_i2c
build_flags =
  ${env:mofei_touch_soft_i2c.build_flags}
  -DMOFEI_TOUCH_PWR_ENABLE_LEVEL=LOW

[env:mofei_touch_soft_i2c_rst7_diag]
extends = env:mofei_touch_soft_i2c
build_flags =
  ${env:mofei_touch_soft_i2c.build_flags}
  -DMOFEI_TOUCH_RST=7


[env:mofei_touch_scan]
extends = env:mofei
build_flags =
  ${env:mofei.build_flags}
  -DMOFEI_TOUCH_SOFT_I2C=1
  -DMOFEI_TOUCH_SCAN=1
  -DMOFEI_TOUCH_ENABLE=1
  -DMOFEI_SD_1BIT=1

[env:mofei_test_sda13_scl12]
extends = env:mofei_touch_soft_i2c
build_flags =
  ${env:mofei_touch_soft_i2c.build_flags}
  -DMOFEI_TOUCH_SDA=13
  -DMOFEI_TOUCH_SCL=12
  -DMOFEI_TOUCH_DIAGNOSTIC_LOG=1

[env:gh_release]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=1 ; Set log level to info for release builds

[env:gh_release_rc]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}-rc+${sysenv.CROSSPOINT_RC_HASH}\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=1 ; Set log level to info for release candidate builds  

[env:slim]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}-slim\"
  ; serial output is disabled in slim builds to save space
  -UENABLE_SERIAL_LOG
