name = "murphy-flasher"
main = "src/index.ts"
compatibility_date = "2026-05-05"

# Route to your custom domain
routes = [
  { pattern = "murphy.pandacat.ai/*", zone_id = "db2d4484320a1f76bca405ccd4dbfaff" }
]

# R2 bucket for firmware binaries
[[r2_buckets]]
binding = "FIRMWARE_BUCKET"
bucket_name = "murphy-firmware"

# KV namespace for version metadata (small, fast access)
[[kv_namespaces]]
binding = "FIRMWARE_META"
id = "c0188469076f46a48cc0f08bb0982002"

[env.production]
routes = [
  { pattern = "murphy.pandacat.ai/*", zone_id = "db2d4484320a1f76bca405ccd4dbfaff" }
]
